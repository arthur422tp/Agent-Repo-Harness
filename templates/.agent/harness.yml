name: Agent Repo Harness
version: 1
mode: lightweight

paths:
  agent_entrypoint: AGENTS.md
  claude_entrypoint: CLAUDE.md
  agent_map: agent.md
  handoff: handoff.md
  task_state: .agent/task.yml
  known_issues: docs/agent/known-issues.md
  discoveries: docs/agent/discoveries.md
  debug_recipes: docs/agent/debug-recipes
  decisions: docs/agent/decisions

superpowers:
  enabled: true
  role: development_workflow_engine
  preferred_execution: subagent-driven-development
  require_tdd_for:
    - feature
    - bugfix
    - refactor
    - behavior-change
  note: >-
    Agent-Repo-Harness wraps around Superpowers and does not replace it.

prompting:
  preferred_style: short-task-prompt
  guidance:
    - Put repeated workflow rules in skills.
    - Put repo-specific facts in agent.md, handoff.md, and docs/agent/*.
    - >-
      Keep the live user prompt focused on the current task and special
      constraints.

context:
  required_files:
    - AGENTS.md
    - agent.md
    - handoff.md
    - .agent/policy.yml
    - .agent/task.yml
  optional_files:
    - CLAUDE.md
    - docs/agent/known-issues.md
    - docs/agent/discoveries.md
    - docs/agent/debug-recipes/

scripts:
  preflight: scripts/agent-preflight.sh
  finish: scripts/agent-finish.sh
  verify: scripts/agent-verify.sh
  collect_context: scripts/collect-context.sh
  check_policy: scripts/check-policy.sh
  check_scope: scripts/check-scope.sh
  check_agent_map: scripts/check-agent-md.sh
  validate_config: scripts/validate-config.sh
  validate_task: scripts/validate-task.sh

subagents:
  require_context_packet: true
  require_red_green_refactor_evidence: true
  collect_discoveries: true
  note: >-
    Use subagent context packets instead of repeating long repo workflow
    prompts.

reviews:
  required:
    - spec-compliance
    - code-quality
  optional:
    - domain-risk

verification:
  final_gate_command: scripts/agent-finish.sh
  required_policy_command: scripts/check-policy.sh
  required_scope_command: scripts/check-scope.sh
  required_command: scripts/agent-verify.sh
  completion_note: >-
    scripts/agent-finish.sh is the recommended final gate before claiming
    completion.
  evidence_dir: .agent/runs
  evidence_summary: finish-summary.md
  # Optional repo-defined verification commands run before heuristic checks.
  # required:
  #   - name: lint
  #     command: npm run lint
  #   - name: tests
  #     command: npm test
  allow_unverified_completion: false

handoff:
  update_on:
    - changed_architecture
    - changed_config
    - changed_verification_status
    - unresolved_blocker
    - new_known_issue
