version: 1
default_mode: warn
approval:
  high_risk:
    env: AGENT_APPROVED_HIGH_RISK
    file: .agent/approvals/high-risk-approved

risk_files:
  high:
    - ".github/workflows/**"
    - "docker-compose*.yml"
    - "compose*.yml"
    - "Dockerfile"
    - ".env*"
    - "**/migrations/**"
    - "**/schema/**"
    - "**/auth/**"
    - "**/permissions/**"
    - "**/billing/**"
    - "**/infra/**"
    - "**/terraform/**"
    - "*.tf"
    - "openapi/**"
    - "graphql/**"
    - "proto/**"
    - "secrets/**"

rules:
  - id: no-architecture-rewrite-without-approval
    level: high
    description: Do not rewrite architecture unless explicitly requested.
  - id: minimal-patch-first
    level: medium
    description: Prefer minimal patches over broad refactors.
  - id: verify-before-completion
    level: high
    description: >-
      Do not claim completion unless verification commands pass or the
      limitation is explicitly reported.
  - id: update-handoff-on-state-change
    level: medium
    description: >-
      Update handoff.md when task state, verification, blockers, or
      architecture-relevant context changes.

required_reviews:
  - domain-risk-review
  - verification-gate

required_before_finish:
  - scripts/agent-finish.sh
  - scripts/check-policy.sh
  - scripts/check-scope.sh
  - scripts/agent-verify.sh

notes:
  - Customize high-risk patterns for this repository after installation.
  - "`agent-finish.sh` is the recommended final gate before claiming completion."
  - "`check-policy.sh` defaults to warning mode and supports `--strict`."
  - In strict mode, use the approval env var or approval file for explicit
    high-risk authorization.
  - Policy workflow should be invoked through skills or repo config, not
    recopied into every task prompt.
